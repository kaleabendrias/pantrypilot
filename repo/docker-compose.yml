services:
  web:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      pantrypilot_net:
        aliases:
          - web

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:80"
    environment:
      DB_HOST: mysql
      DB_NAME: pantrypilot
      DB_USER: ${DB_USER:-pantry}
      DB_PASS: ${DB_PASS:-pantrypass}
      DB_PORT: "3306"
      PANTRYPILOT_GATEWAY_HMAC_SECRET: ${PANTRYPILOT_GATEWAY_HMAC_SECRET:-change_me_gateway_hmac_secret_64chars_min}
      PANTRYPILOT_CRYPTO_KEY: ${PANTRYPILOT_CRYPTO_KEY:-change_me_crypto_key_exactly32b!}
      PANTRYPILOT_CRYPTO_IV: ${PANTRYPILOT_CRYPTO_IV:-change_me_16bytes}
    volumes:
      - ./backend:/var/www/html
      - ./tests:/workspace/tests:ro
      - ./frontend:/workspace/frontend:ro
      - ./docker/mysql/init:/workspace/db_init:ro
    healthcheck:
      test: ["CMD", "php", "-r", "exit((@file_get_contents('http://localhost/')!==false)?0:1);"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped
    networks:
      pantrypilot_net:
        aliases:
          - api

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-pantrypilot}
      MYSQL_USER: ${DB_USER:-pantry}
      MYSQL_PASSWORD: ${DB_PASS:-pantrypass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      pantrypilot_net:
        aliases:
          - mysql

networks:
  pantrypilot_net:
    name: pantrypilot_net
    driver: bridge

volumes:
  mysql_data:
