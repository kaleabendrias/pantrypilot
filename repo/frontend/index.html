<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PantryPilot Kiosk</title>
  <link rel="stylesheet" href="assets/layui/css/layui.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="shell">
  <header class="hero">
    <div class="hero-main">
      <h1>PantryPilot Control Deck</h1>
      <p>Offline-ready retail pantry platform for kiosk operations and local Wi-Fi ordering.</p>
      <div class="auth-row">
        <input id="username" placeholder="username" />
        <input id="password" type="password" placeholder="password" />
        <button class="layui-btn" id="btnLogin">Login</button>
        <span id="authState">Not authenticated</span>
      </div>
    </div>
    <aside class="sync-panel">
      <strong>Offline Queue</strong>
      <div id="syncState">Ready</div>
      <button class="layui-btn layui-btn-sm" id="btnSync">Sync Pending Actions</button>
    </aside>
  </header>

  <div class="layui-tab" lay-filter="main-tab">
    <ul class="layui-tab-title">
      <li class="layui-this">Dashboard</li>
      <li>Recipes</li>
      <li>Booking Flow</li>
      <li>Operations</li>
      <li>Payments</li>
      <li>Messages</li>
      <li>Files</li>
      <li>Admin</li>
    </ul>
    <div class="layui-tab-content">
      <div class="layui-tab-item layui-show">
        <div id="kpiCards" class="cards"></div>
      </div>

      <div class="layui-tab-item">
        <div class="search-panel">
          <input id="recipeSearchIngredient" placeholder="ingredient (e.g. garbanzo)" />
          <input id="recipeSearchCookware" placeholder="cookware (e.g. pot)" />
          <input id="recipeSearchExcludeAllergens" placeholder="exclude allergens (comma-separated)" />
          <select id="recipeSearchPrep">
            <option value="">Any prep time</option>
            <option value="30">Under 30 min</option>
          </select>
          <select id="recipeSearchStepCount">
            <option value="">Any step count</option>
            <option value="5">Max 5 steps</option>
            <option value="8">Max 8 steps</option>
            <option value="12">Max 12 steps</option>
          </select>
          <select id="recipeSearchDifficulty">
            <option value="">Any difficulty</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
          <select id="recipeSearchMaxCalories">
            <option value="">Any calories</option>
            <option value="450">Under 450 kcal</option>
            <option value="600">Under 600 kcal</option>
          </select>
          <select id="recipeSearchBudget">
            <option value="">Any budget</option>
            <option value="15">Under $15</option>
          </select>
          <input id="recipeSearchTags" placeholder="tags (e.g. vegan, gluten-free)" />
          <select id="recipeSearchRankMode">
            <option value="popular">Rank: Popular</option>
            <option value="time-saving">Rank: Time-saving</option>
            <option value="budget">Rank: Budget</option>
            <option value="low-calorie">Rank: Low-calorie</option>
          </select>
          <button class="layui-btn" id="btnSearchRecipes">Search</button>
          <button class="layui-btn layui-btn-primary" id="btnLoadRecipes">Load All</button>
          <button class="layui-btn layui-btn-normal" id="btnCreateRecipe">Create Recipe From Form</button>
        </div>
        <div class="search-panel">
          <input id="recipeName" placeholder="new recipe name" />
          <input id="recipeDescription" placeholder="description" />
          <input id="recipeIngredients" placeholder="ingredients (comma-separated)" />
          <input id="recipeCookware" placeholder="cookware (comma-separated)" />
          <input id="recipeAllergens" placeholder="allergens (comma-separated)" />
          <input id="recipePrepMinutes" type="number" min="1" placeholder="prep minutes" />
          <input id="recipeStepCount" type="number" min="1" placeholder="step count" />
          <input id="recipeServings" type="number" min="1" placeholder="servings" />
          <select id="recipeDifficultyCreate">
            <option value="">difficulty</option>
            <option value="easy">easy</option>
            <option value="medium">medium</option>
            <option value="hard">hard</option>
          </select>
          <input id="recipeCalories" type="number" min="0" placeholder="calories" />
          <input id="recipeEstimatedCost" type="number" step="0.01" min="0" placeholder="estimated cost" />
          <select id="recipeStatus">
            <option value="">status</option>
            <option value="draft">draft</option>
            <option value="published">published</option>
            <option value="archived">archived</option>
          </select>
        </div>
        <div id="recipesGrid" class="recipe-grid"></div>
      </div>

      <div class="layui-tab-item">
        <div class="toolbar">
          <button class="layui-btn" id="btnLoadBookings">Load Bookings</button>
          <button class="layui-btn" id="btnRecipeDetail">Recipe Detail (Selected)</button>
          <button class="layui-btn" id="btnCheckCapacity">Refresh Slot Capacity</button>
          <button class="layui-btn layui-btn-normal" id="btnCreateBooking">Book Selected Slot</button>
          <input id="bookingSelectedId" placeholder="selected booking id" />
        </div>
        <div class="search-panel">
          <select id="pickupPointSelect"><option value="">Pickup point</option></select>
          <input id="pickupPointManual" placeholder="or pickup point id" />
          <input id="slotDate" type="date" />
          <input id="slotWindowStart" type="time" placeholder="window start" />
          <input id="slotWindowEnd" type="time" placeholder="window end" />
          <input id="slotStepMinutes" type="number" min="15" step="15" placeholder="step minutes" />
          <input id="bookingQuantity" type="number" min="1" placeholder="quantity" />
          <input id="bookingZip4" placeholder="ZIP+4 (12345-6789)" />
          <input id="bookingRegionCode" placeholder="region code" />
          <input id="bookingLatitude" placeholder="latitude" />
          <input id="bookingLongitude" placeholder="longitude" />
          <input id="bookingNote" placeholder="booking note" />
        </div>
        <div id="slotPicker" class="slot-picker"></div>
        <div id="bookingFeedback" class="feedback"></div>
        <table class="layui-table" id="bookingsTable"></table>
      </div>

      <div class="layui-tab-item">
        <div class="toolbar">
          <button class="layui-btn" id="btnTodayPickups">Today's Pickups</button>
          <button class="layui-btn" id="btnCheckIn">Check-in Selected Booking</button>
          <button class="layui-btn layui-btn-normal" id="btnSweepNoShow">Run No-show Sweep</button>
          <button class="layui-btn" id="btnDispatchNote">Print Dispatch (Selected)</button>
        </div>
        <div class="toolbar">
          <button class="layui-btn" id="btnLoadCampaigns">Load Campaigns</button>
          <button class="layui-btn layui-btn-normal" id="btnCreateCampaign">Create Campaign</button>
          <button class="layui-btn" id="btnLoadModules">Load Homepage Modules</button>
          <button class="layui-btn" id="btnSaveModule">Save Module</button>
          <button class="layui-btn" id="btnLoadTemplates">Load Templates</button>
          <button class="layui-btn" id="btnSaveTemplate">Save Template</button>
        </div>
        <div class="toolbar" id="managerDashboardControls">
          <button class="layui-btn" id="btnManagerDashboard">Manager Dashboard</button>
          <button class="layui-btn" id="btnManagerAnomalies">Anomalies</button>
          <button class="layui-btn" id="btnManagerExportCsv">Export CSV</button>
        </div>
        <div class="search-panel">
          <input id="campaignName" placeholder="campaign name" />
          <input id="campaignSlot" placeholder="campaign slot" />
          <input id="campaignStartAt" type="datetime-local" placeholder="start at" />
          <input id="campaignEndAt" type="datetime-local" placeholder="end at" />
          <input id="campaignBudget" type="number" step="0.01" min="0" placeholder="budget" />
          <input id="moduleKey" placeholder="module key" />
          <input id="moduleTitle" placeholder="module title" />
          <input id="moduleBannerImage" placeholder="module banner image" />
          <input id="moduleBannerLink" placeholder="module banner link" />
          <input id="templateCode" placeholder="template code" />
          <input id="templateTitle" placeholder="template title" />
          <input id="templateContent" placeholder="template content" />
          <input id="templateCategory" placeholder="template category" />
        </div>
        <div id="opsFeedback" class="feedback"></div>
        <table class="layui-table" id="opsTable"></table>
      </div>

      <div class="layui-tab-item">
        <div class="toolbar">
          <button class="layui-btn" id="btnLoadPayments">Load Payments</button>
          <button class="layui-btn layui-btn-normal" id="btnCreatePayment">Capture Payment</button>
          <button class="layui-btn" id="btnCreateGwOrder">Create Gateway Order</button>
          <button class="layui-btn" id="btnAutoCancelGw">Auto-cancel Pending</button>
          <button class="layui-btn" id="btnDailyRecon">Daily Reconcile</button>
        </div>
        <div class="toolbar">
          <button class="layui-btn" id="btnListBatches">Review Batches</button>
          <button class="layui-btn" id="btnListIssues">Review Issues</button>
          <button class="layui-btn" id="btnIssueReauth">Issue Reauth</button>
          <button class="layui-btn" id="btnRepairIssue">Repair Issue</button>
          <button class="layui-btn" id="btnCloseBatch">Close Batch</button>
          <button class="layui-btn" id="btnRefund">Refund Payment</button>
          <button class="layui-btn" id="btnAdjust">Adjust Payment</button>
        </div>
        <div class="search-panel">
          <input id="paymentAmount" type="number" step="0.01" min="0.01" placeholder="payment amount" />
          <input id="paymentMethod" placeholder="payment method" />
          <input id="payerName" placeholder="payer name" />
          <input id="gatewayOrderAmount" type="number" step="0.01" min="0.01" placeholder="gateway order amount" />
          <input id="reconIssueId" type="number" min="1" placeholder="issue id" />
          <input id="reconRepairNote" placeholder="repair note" />
          <input id="paymentRefInput" placeholder="payment ref for refund/adjust" />
          <input id="adjustAmount" type="number" step="0.01" placeholder="adjust amount" />
          <input id="adjustReason" placeholder="adjust reason" />
        </div>
        <div id="financeFeedback" class="feedback"></div>
        <table class="layui-table" id="paymentsTable"></table>
      </div>

      <div class="layui-tab-item">
        <div class="toolbar">
          <button class="layui-btn" id="btnLoadEvents">Load Events</button>
          <button class="layui-btn layui-btn-normal" id="btnQueueEvent">Queue Notification</button>
          <button class="layui-btn" id="btnSendMarketing">Send Marketing</button>
          <button class="layui-btn" id="btnLoadInbox">Inbox</button>
          <button class="layui-btn" id="btnMsgAnalytics">Read/Click Analytics</button>
        </div>
        <div class="search-panel">
          <input id="eventType" placeholder="event type" />
          <input id="eventChannel" placeholder="event channel" />
          <input id="messageUserId" type="number" min="1" placeholder="recipient user id" />
          <input id="messageTitle" placeholder="message title" />
          <input id="messageBody" placeholder="message body" />
          <select id="messageMarketing"><option value="1">Marketing</option><option value="0">Transactional</option></select>
        </div>
        <div id="msgFeedback" class="feedback"></div>
        <table class="layui-table" id="eventsTable"></table>
      </div>

      <div class="layui-tab-item">
        <div class="toolbar">
          <button class="layui-btn" id="btnLoadFiles">Load Files</button>
          <button class="layui-btn" id="btnUploadMockFile">Upload File</button>
          <button class="layui-btn" id="btnSignFile">Signed URL (Selected)</button>
          <button class="layui-btn" id="btnCleanupFiles">Run 180-day Cleanup</button>
          <input id="fileSelectedId" placeholder="selected file id" />
        </div>
        <div class="search-panel">
          <input id="fileName" placeholder="filename" />
          <select id="fileMimeType">
            <option value="application/pdf">application/pdf</option>
            <option value="image/png">image/png</option>
            <option value="image/jpeg">image/jpeg</option>
            <option value="text/csv">text/csv</option>
          </select>
          <textarea id="fileContent" placeholder="plain content for csv or base64 override"></textarea>
          <input id="fileOwnerType" placeholder="owner type" />
          <input id="fileOwnerId" type="number" min="0" placeholder="owner id (optional)" />
          <select id="fileWatermark"><option value="0">No watermark</option><option value="1">Watermark image</option></select>
        </div>
        <div id="fileFeedback" class="feedback"></div>
        <table class="layui-table" id="filesTable"></table>
      </div>

      <div class="layui-tab-item">
        <div class="toolbar">
          <button class="layui-btn" id="btnLoadUsers">Load Users</button>
          <button class="layui-btn" id="btnLoadAudit">Load Audit Logs</button>
          <button class="layui-btn" id="btnOpsDashboard">Ops Metrics</button>
          <button class="layui-btn" id="btnAnomalies">Anomalies</button>
          <button class="layui-btn" id="btnExportCsv">Export CSV</button>
        </div>
        <div class="toolbar">
          <button class="layui-btn layui-btn-normal" id="btnCreateRole">Create Role</button>
          <button class="layui-btn" id="btnLoadRoles">Load Roles</button>
          <button class="layui-btn" id="btnLoadPerms">Load Perms</button>
          <button class="layui-btn" id="btnEnableUser">Enable User</button>
          <button class="layui-btn layui-btn-danger" id="btnDisableUser">Disable User</button>
          <button class="layui-btn" id="btnResetPassword">Reset Password</button>
        </div>
        <div class="toolbar">
          <button class="layui-btn" id="btnGrantPermission">Grant Permission</button>
          <button class="layui-btn" id="btnAssignRole">Assign Role</button>
          <button class="layui-btn" id="btnUpdateScopes">Update Scopes</button>
        </div>
        <div class="search-panel">
          <input id="adminTargetUserId" type="number" min="1" placeholder="target user id" />
          <input id="adminNewPassword" type="password" placeholder="new password (for reset)" />
          <input id="adminRoleId" type="number" min="1" placeholder="role id" />
          <input id="adminPermId" type="number" min="1" placeholder="permission id" />
          <input id="adminResourceId" type="number" min="1" placeholder="resource id" />
          <input id="adminScopeStore" placeholder="store scope ids (comma)" />
          <input id="adminScopeWarehouse" placeholder="warehouse scope ids (comma)" />
          <input id="adminScopeDept" placeholder="department scope ids (comma)" />
        </div>
        <div id="adminFeedback" class="feedback"></div>
        <div class="split-grid">
          <table class="layui-table" id="usersTable"></table>
          <table class="layui-table" id="auditTable"></table>
        </div>
      </div>
    </div>
  </div>
  </main>

  <script src="assets/layui/layui.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
